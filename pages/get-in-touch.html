<div class="toggle-contact">
    <!-- Start Contact Form -->
    <div class="contact-form">
        <div class="container">
            <div class="section-body">
                <h1 data-i18n="contactUs.h1">اتصل بنا:</h1>
                <form id="contact-form" action="https://formspree.io/f/xjgazlrr" method="POST">
                    <!-- Input Fields -->
                    <div class="input-fields">
                        <div class="field name">
                            <label for="name" data-i18n="contactUs.contactForm.lbl.name">الاسم</label>
                            <input type="text" id="name" name="name" maxlength="100" required>
                        </div>
                        <!-- input -->
                        <div class="field email">
                            <label for="email" data-i18n="contactUs.contactForm.lbl.email">البريد الإلكتروني</label>
                            <input type="email" id="email" name="email" maxlength="254" required>
                        </div>
                        <!-- input -->
                        <div class="field phone">
                            <label for="phone" data-i18n="contactUs.contactForm.lbl.phone">رقم الهاتف</label>
                            <input id="phone" type="tel" inputmode="numeric" name="phone" maxlength="16" required>
                        </div>
                        <!-- input -->
                        <div class="field company">
                            <label for="company" data-i18n="contactUs.contactForm.lbl.company">الشركة</label>
                            <input type="text" id="company" name="company" maxlength="150" required>
                        </div>
                        <!-- input -->
                        <div class="field service">
                            <label for="service" data-i18n="contactUs.contactForm.lbl.service">الخدمة</label>
                            <select id="service" name="service" required>
                                <option value="op1">op1</option>
                                <option value="op2">op2</option>
                                <option value="op3">op3</option>
                            </select>
                        </div>
                    </div>
                    <!-- Text Message -->
                    <div class="txt-msg">
                        <label for="txt-msg" data-i18n="contactUs.contactForm.lbl.txtMsg">نص الرسالة</label>
                        <textarea id="txt-msg" name="txt-msg" minlength="10" maxlength="200" required></textarea>
                        <button type="submit" data-i18n="contactUs.contactForm.btn.send">إرسال</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- End Contact Form -->
</div>
